<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - GSP</title>
    <link rel="stylesheet" href="/stylesheet/loginStylesheet.css" />
    <style>
      body {
        margin: 0;
      }
      .reset-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3f4f6;
        padding: 24px;
        box-sizing: border-box;
      }
      .reset-card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        padding: 28px;
      }
      .reset-card h1 {
        margin-top: 0;
        margin-bottom: 12px;
      }
      .reset-card p {
        line-height: 1.6;
        color: #374151;
      }
      .reset-card label {
        display: block;
        margin-top: 16px;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .reset-card input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      .reset-card button {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="reset-wrapper">
      <div class="reset-card">
        <h1>Choose a new password</h1>
        <p>Enter your new password below. For best results, use at least 8 characters.</p>
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter your new password" />
        <button id="reset-btn">Update Password</button>
      </div>
    </div>

    <script src="/models/resetPassword.js"></script>
  </body>
</html>
